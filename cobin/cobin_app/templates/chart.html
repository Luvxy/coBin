{% extends 'base.html' %}
{% block title %}실시간 코인 차트{% endblock %}

{% block content %}
  <h2 style="margin-bottom: 1rem;">📈 실시간 코인 차트</h2>

  <!-- 코인 선택 드롭다운 -->
  <div class="dropdown-container">
    <label for="coinSelect" class="dropdown-label">코인 선택:</label>
    <select id="coinSelect" class="dropdown">
      <option value="KRW-BTC" selected>BTC/KRW</option>
      <option value="KRW-ETH">ETH/KRW</option>
      <option value="KRW-XRP">XRP/KRW</option>
    </select>
  </div>

  <!-- 시간 단위 선택 드롭다운 -->
  <div class="dropdown-container">
    <label for="time-unit-selector" class="dropdown-label">시간 단위:</label>
    <select id="time-unit-selector" class="dropdown">
      <option value="minute1">1분</option>
      <option value="minute3">3분</option>
      <option value="minute5">5분</option>
      <option value="minute10">10분</option>
      <option value="minute15">15분</option>
      <option value="minute30" selected>30분</option>
      <option value="minute60">1시간</option>
      <option value="minute240">4시간</option>
      <option value="day">1일</option>
    </select>
  </div>

  <!-- 차트 영역 -->
  <div id="chart"></div>
  <div class="chart-container">
    <canvas id="coinChart"></canvas>
  </div>

  <!-- 실시간 채팅 -->
  <div id="chat-section">
    <h3>💬 실시간 채팅</h3>
    <div id="chat-box" style="height:200px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>
    <div style="display:flex; gap:10px; margin-top:5px;">
      <input type="text" id="chat-message" placeholder="메시지 입력..." style="flex:1; padding:5px;">
      <button id="chat-send">전송</button>
    </div>
  </div>
{% endblock %}
